version: '3.8'

services:
  # Database service
  db:
    image: mysql:8.0
    container_name: wordpress_db
    restart: unless-stopped
    # environment:
    #   MYSQL_DATABASE: wordpress
    #   MYSQL_USER: wordpress_user
    #   MYSQL_PASSWORD: wordpress_password   # Change this!
    #   MYSQL_ROOT_PASSWORD: root_password   # Change this!
    env_file:
      - ./.env.production
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - wp_network

  # WordPress service
  wordpress:
    image: wordpress:latest
    container_name: wordpress_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: wordpress_password   # Must match db user password
      WORDPRESS_DB_NAME: wordpress
    env_file:
      - ./.env.production
    volumes:
      # Persist entire wp-content (themes, plugins, uploads)
      - ./wp_content:/var/www/html/wp-content
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db
    networks:
      - wp_network

  # MySQL backup to S3 (cron: backup 02:00, cleanup 03:00)
  backup:
    image: alpine:latest
    container_name: wordpress_backup
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./backup-mysql-to-s3.sh:/backup.sh:ro
      - ./restore-mysql-from-s3.sh:/restore.sh:ro
      - ./cleanup-mysql-from-s3.sh:/cleanup.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - MYSQL_CONTAINER=wordpress_db
      - S3_BACKUP_PATH=mysql-backups
      - CLEANUP_AFTER=10m
      - DOCKER_API_VERSION=1.41
    env_file:
      - ./.env.production
    entrypoint: |
      sh -c "
        apk add --no-cache mysql-client aws-cli bash docker-cli &&
        cp /backup.sh /usr/local/bin/backup.sh &&
        cp /restore.sh /usr/local/bin/restore.sh &&
        cp /cleanup.sh /usr/local/bin/cleanup.sh &&
        chmod +x /usr/local/bin/backup.sh /usr/local/bin/restore.sh /usr/local/bin/cleanup.sh &&
        echo '*/2 * * * * .  /usr/local/bin/backup.sh >> /proc/1/fd/1 2>&1' > /etc/crontabs/root &&
        echo '*/5 * * * * .  /usr/local/bin/cleanup.sh >> /proc/1/fd/1 2>&1' >> /etc/crontabs/root &&
        crond -f -l 2
      "

networks:
  wp_network:
    name: wordpress_network